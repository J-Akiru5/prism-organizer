name: Publish (NPM + PyInstaller)

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Run Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  build-exe:
    name: Build Windows .exe
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name prism-organizer --hidden-import rich --hidden-import questionary --hidden-import colorama --hidden-import yaml --hidden-import tqdm --add-data "prism_organizer;prism_organizer" prism_organizer/__main__.py

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: prism-organizer-exe
          path: dist/prism-organizer.exe

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build-exe
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-exe
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: prism-organizer-exe
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/prism-organizer.exe
          generate_release_notes: true
