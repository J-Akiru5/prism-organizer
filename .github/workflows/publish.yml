name: Publish (NPM + PyInstaller)

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release:
    name: Build & Publish Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pip install pytest pytest-anyio

      - name: Run pytest
        run: pytest

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name prism-organizer --hidden-import rich --hidden-import questionary --hidden-import colorama --hidden-import yaml --hidden-import tqdm --add-data "prism_organizer;prism_organizer" prism_organizer/__main__.py

      - name: Inject checksum into npm wrapper
        run: node scripts/inject-checksum.js

      - name: Check if version already published to NPM
        id: check-npm
        shell: bash
        run: |
          CURRENT_VER=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view prism-organizer@$CURRENT_VER version 2>/dev/null || echo "not-found")
          echo "current=$CURRENT_VER" >> $GITHUB_OUTPUT
          echo "tag_name=v$CURRENT_VER" >> $GITHUB_OUTPUT
          if [ "$PUBLISHED" != "not-found" ]; then
            echo "already=yes" >> $GITHUB_OUTPUT
            echo "Version $CURRENT_VER is already published on NPM. Skipping publish/release."
          else
            echo "already=no" >> $GITHUB_OUTPUT
          fi

      - name: Publish to NPM
        if: steps.check-npm.outputs.already != 'yes'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check-npm.outputs.already != 'yes'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check-npm.outputs.tag_name }}
          name: ${{ steps.check-npm.outputs.tag_name }}
          files: dist/prism-organizer.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
