name: Publish (NPM + PyInstaller)

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Check if version already published
        id: check
        run: |
          CURRENT_VER=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view prism-organizer@$CURRENT_VER version 2>/dev/null || echo "not-found")
          echo "current=$CURRENT_VER" >> $GITHUB_OUTPUT
          if [ "$PUBLISHED" != "not-found" ]; then
            echo "already=yes" >> $GITHUB_OUTPUT
            echo "Version $CURRENT_VER is already published. Skipping."
          else
            echo "already=no" >> $GITHUB_OUTPUT
          fi

      - name: Publish to NPM
        if: steps.check.outputs.already != 'yes'
        run: |
          echo "Publishing version ${{ steps.check.outputs.current }} ..."
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-exe:
    name: Build Windows .exe
    runs-on: windows-latest
    needs: publish-npm
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name prism-organizer --hidden-import rich --hidden-import questionary --hidden-import colorama --hidden-import yaml --hidden-import tqdm --add-data "prism_organizer;prism_organizer" prism_organizer/__main__.py

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: prism-organizer-exe
          path: dist/prism-organizer.exe

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-exe
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: prism-organizer-exe
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/prism-organizer.exe
          generate_release_notes: true
